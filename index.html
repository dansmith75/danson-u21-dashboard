<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Danson U21 Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial; margin: 20px; }
  .chart-container { width: 100%; max-width: 900px; margin-bottom: 40px; }
  .filters { margin-bottom: 20px; }
  .filters label { margin-right: 15px; }
</style>
</head>

<body>
<h1>Danson U21 Dashboard</h1>

<div class="filters">
  <h3>Competition</h3>
  <label><input type="radio" name="comp" value="All" checked> All</label>
  <label><input type="radio" name="comp" value="League"> League</label>
  <label><input type="radio" name="comp" value="Cup"> Cup</label>
  <label><input type="radio" name="comp" value="Shield"> Shield</label>
  <label><input type="radio" name="comp" value="Friendly"> Friendly</label>
  <label><input type="radio" name="comp" value="Training"> Training</label>

  <h3>Home / Away</h3>
  <label><input type="radio" name="ha" value="All" checked> All</label>
  <label><input type="radio" name="ha" value="Home"> Home</label>
  <label><input type="radio" name="ha" value="Away"> Away</label>

  <h3>Result</h3>
  <label><input type="radio" name="result" value="All" checked> All</label>
  <label><input type="radio" name="result" value="Win"> Win</label>
  <label><input type="radio" name="result" value="Draw"> Draw</label>
  <label><input type="radio" name="result" value="Loss"> Loss</label>
</div>

<div class="chart-container">
  <canvas id="goalsChart"></canvas>
</div>

<div class="chart-container">
  <canvas id="attendanceChart"></canvas>
</div>

<script>
async function loadData() {
  const base = "https://raw.githubusercontent.com/dansmith75/danson-u21-dashboard/main/data";

  const [matches, goals, matchAtt, trainAtt] = await Promise.all([
    fetch(`${base}/matches.json`).then(r => r.json()),
    fetch(`${base}/goals.json`).then(r => r.json()),
    fetch(`${base}/match-attendance.json`).then(r => r.json()),
    fetch(`${base}/training-attendance.json`).then(r => r.json())
  ]);

  const attendance = [...matchAtt, ...trainAtt];
  return { matches, goals, attendance };
}

function getRadioValue(name) {
  return document.querySelector(`input[name="${name}"]:checked`).value;
}

function filterAttendance(attendance) {
  const comp = getRadioValue("comp");
  const ha = getRadioValue("ha");
  const res = getRadioValue("result");

  return attendance.filter(a => {
    if (a.type === "Training") {
      return comp === "All" || comp === "Training";
    }

    const compOK = (comp === "All" || a.competition === comp);
    const haOK = (ha === "All" || a.homeAway === ha);
    const resOK = (res === "All" || a.result === res);

    return compOK && haOK && resOK;
  });
}

function filterGoals(goals) {
  const comp = getRadioValue("comp");
  const ha = getRadioValue("ha");
  const res = getRadioValue("result");

  return goals.filter(g => {
    const compOK = (comp === "All" || g.competition === comp);
    const haOK = (ha === "All" || g.homeAway === ha);
    const resOK = (res === "All" || g.result === res);
    return compOK && haOK && resOK;
  });
}

function renderCharts(goals, attendance) {
  const players = Object.keys(goals[0].goals);

  const goalTotals = players.map(p =>
    goals.reduce((sum, g) => sum + g.goals[p], 0)
  );

  const attTotals = players.map(p =>
    attendance.reduce((sum, a) => {
      const code = a.attendance[p];
      return sum + (code === "Y" ? 1 : 0);
    }, 0)
  );

  new Chart(document.getElementById("goalsChart"), {
    type: "bar",
    data: {
      labels: players,
      datasets: [{
        label: "Goals",
        data: goalTotals,
        backgroundColor: "rgba(0, 99, 255, 0.6)"
      }]
    }
  });

  new Chart(document.getElementById("attendanceChart"), {
    type: "bar",
    data: {
      labels: players,
      datasets: [{
        label: "Attendance (Y only)",
        data: attTotals,
        backgroundColor: "rgba(0, 200, 80, 0.6)"
      }]
    }
  });
}

async function init() {
  const { matches, goals, attendance } = await loadData();

  function update() {
    const fg = filterGoals(goals);
    const fa = filterAttendance(attendance);
    renderCharts(fg, fa);
  }

  document.querySelectorAll("input").forEach(el => {
    el.addEventListener("change", update);
  });

  update();
}

init();
</script>

</body>
</html>

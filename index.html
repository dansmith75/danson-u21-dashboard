<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danson U21 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #2563eb;
      --primary-dark: #0f172a;
      --accent: #38bdf8;
      --green: #10b981;
      --purple: #a855f7;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    body.dark {
      --bg: #020617;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #1e293b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: linear-gradient(135deg, #020617, #0f172a 55%, #2563eb);
      color: white;
      padding: 28px 24px;
      border-bottom: 4px solid var(--accent);
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .hero img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      background: white;
      border-radius: 50%;
      padding: 6px;
      flex-shrink: 0;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
    }

    .hero p {
      margin: 6px 0 0;
      color: #dbeafe;
    }

    .theme-toggle {
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      backdrop-filter: blur(10px);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.25);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: fadeUp 0.35s ease;
    }

    .card,
    .chart-container,
    .stat {
      animation: fadeUp 0.45s ease both;
    }

    .card,
    .chart-container {
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      border: 1px solid var(--line);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover,
    .chart-container:hover,
    .stat:hover {
      transform: translateY(-4px);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat {
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      padding: 18px;
      border-radius: 20px;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.18);
      transition: transform 0.25s ease;
    }

    .stat.training {
      background: linear-gradient(135deg, #064e3b, #10b981);
    }

    .stat.friendly {
      background: linear-gradient(135deg, #581c87, #a855f7);
    }

    .stat b {
      display: block;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .stat span {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }

    .filters h3 {
      margin: 16px 0 10px;
      color: var(--text);
    }

    .filters label {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      margin: 5px 6px 5px 0;
      cursor: pointer;
      border: 1px solid var(--line);
    }

    .filters input {
      margin-right: 6px;
      accent-color: var(--primary);
    }

    .chart-title {
      margin-top: 0;
      color: var(--text);
    }

    .chart-box {
      position: relative;
      height: 430px;
      width: 100%;
    }

    .executive {
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
    }

    .executive h2 {
      color: var(--text);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 650px) {
      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero-left {
        align-items: flex-start;
      }

      .hero img {
        width: 64px;
        height: 64px;
      }

      main {
        padding: 14px;
      }

      .chart-box {
        height: 360px;
      }
    }
  </style>
</head>

<body>
  <header class="hero">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danson U21 Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>body{font-family:Arial,sans-serif;margin:20px;background:#f5f7fa;color:#222}.card,.chart-container{background:#fff;padding:18px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px}.filters label{margin-right:12px;display:inline-block;margin-bottom:8px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}.stat{background:#0b5ed7;color:white;border-radius:10px;padding:14px}.stat b{font-size:26px;display:block}canvas{max-height:420px}</style>
</head><body><h1>Danson U21 Dashboard</h1>
<div class="card filters"><h3>Competition</h3><label><input type="radio" name="comp" value="All" checked> All</label><label><input type="radio" name="comp" value="League"> League</label><label><input type="radio" name="comp" value="Cup"> Cup</label><label><input type="radio" name="comp" value="Shield"> Shield</label><label><input type="radio" name="comp" value="Friendly"> Friendly</label><label><input type="radio" name="comp" value="Training"> Training</label><h3>Home / Away</h3><label><input type="radio" name="ha" value="All" checked> All</label><label><input type="radio" name="ha" value="Home"> Home</label><label><input type="radio" name="ha" value="Away"> Away</label><h3>Result</h3><label><input type="radio" name="result" value="All" checked> All</label><label><input type="radio" name="result" value="Win"> Win</label><label><input type="radio" name="result" value="Draw"> Draw</label><label><input type="radio" name="result" value="Loss"> Loss</label></div>
<div class="summary" id="summary"></div><div class="chart-container"><canvas id="goalsChart"></canvas></div><div class="chart-container"><canvas id="attendanceChart"></canvas></div>
<script>
const DATA='data/'; let goalsChart, attendanceChart, store={};
const val=n=>document.querySelector(`input[name="${n}"]:checked`).value;
async function load(){const files=['matches','goals','match-attendance','training-attendance','players']; const res=await Promise.all(files.map(f=>fetch(`${DATA}${f}.json`).then(r=>r.json()))); store={matches:res[0],goals:res[1],matchAtt:res[2],trainAtt:res[3],players:res[4]};}
function fMeta(x){const c=val('comp'),h=val('ha'),r=val('result'); if(c==='Training') return x.competition==='Training'; return (c==='All'||x.competition===c)&&(h==='All'||x.homeAway===h)&&(r==='All'||x.result===r);}
function totals(rows,key){return store.players.map(p=>rows.reduce((s,row)=>s+Number(row[key]?.[p]||0),0));}
function draw(id, old, label, labels, data, color){if(old) old.destroy(); return new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets:[{label,data,backgroundColor:color}]},options:{responsive:true,scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});}
function update(){const matches=store.matches.filter(fMeta), goals=store.goals.filter(fMeta); const att=[...store.matchAtt,...store.trainAtt].filter(fMeta); document.getElementById('summary').innerHTML=`<div class="stat"><b>${matches.length}</b>Games</div><div class="stat"><b>${matches.filter(m=>m.result==='Win').length}</b>Wins</div><div class="stat"><b>${matches.reduce((s,m)=>s+Number(m.goalsFor||0),0)}</b>Goals For</div><div class="stat"><b>${att.reduce((s,a)=>s+a.count,0)}</b>Attendances</div>`; goalsChart=draw('goalsChart',goalsChart,'Goals',store.players,totals(goals,'goals'),'rgba(0,99,255,.65)'); attendanceChart=draw('attendanceChart',attendanceChart,'Attendance',store.players,totals(att,'attendance'),'rgba(0,180,90,.65)');}
load().then(()=>{document.querySelectorAll('input').forEach(i=>i.addEventListener('change',update)); update();});
</script></body></html>

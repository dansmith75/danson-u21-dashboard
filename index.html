<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danson U21 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #2563eb;
      --accent: #38bdf8;
      --green: #10b981;
      --purple: #a855f7;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    body.dark {
      --bg: #020617;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #1e293b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: linear-gradient(135deg, #020617, #0f172a 55%, #2563eb);
      color: white;
      padding: 28px 24px;
      border-bottom: 4px solid var(--accent);
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .hero img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      background: white;
      border-radius: 50%;
      padding: 6px;
      flex-shrink: 0;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
    }

    .hero p {
      margin: 6px 0 0;
      color: #dbeafe;
    }

    .theme-toggle {
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      backdrop-filter: blur(10px);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.25);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: fadeUp 0.35s ease;
    }

    .overview-block {
      margin-bottom: 26px;
    }

    .overview-block h2 {
      margin: 0 0 12px;
      color: var(--text);
      font-size: 22px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .card,
    .chart-container,
    .stat {
      animation: fadeUp 0.45s ease both;
    }

    .card,
    .chart-container {
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      border: 1px solid var(--line);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover,
    .chart-container:hover,
    .stat:hover {
      transform: translateY(-4px);
    }

    .stat {
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      padding: 18px;
      border-radius: 20px;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.18);
      transition: transform 0.25s ease;
    }

    .stat.training {
      background: linear-gradient(135deg, #064e3b, #10b981);
    }

    .stat.friendly {
      background: linear-gradient(135deg, #581c87, #a855f7);
    }

    .stat b {
      display: block;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .stat span {
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }

    .filters h3 {
      margin: 16px 0 10px;
      color: var(--text);
    }

    .filters label {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      margin: 5px 6px 5px 0;
      cursor: pointer;
      border: 1px solid var(--line);
    }

    .filters input {
      margin-right: 6px;
      accent-color: var(--primary);
    }

    .chart-title {
      margin-top: 0;
      color: var(--text);
    }

    .chart-box {
      position: relative;
      height: 430px;
      width: 100%;
    }

    .executive {
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
    }

    .executive h2 {
      color: var(--text);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 650px) {
      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero-left {
        align-items: flex-start;
      }

      .hero img {
        width: 64px;
        height: 64px;
      }

      main {
        padding: 14px;
      }

      .chart-box {
        height: 360px;
      }
    }
  </style>
</head>

<body>
  <header class="hero">
    <div class="hero-left">
      <img src="Danson-Logo.png" alt="Danson logo">
      <div>
        <h1>Danson U21 Dashboard</h1>
        <p>2025/26 Season Statistics</p>
      </div>
    </div>

    <button class="theme-toggle" id="themeToggle">Dark Mode</button>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab-btn active" data-page="overview">Overview</button>
      <button class="tab-btn" data-page="goals">Goals</button>
      <button class="tab-btn" data-page="attendance">Attendance</button>
    </nav>

    <section id="overview" class="page active">
      <div class="overview-block">
        <h2>Competitive Summary</h2>
        <div class="summary" id="competitiveSummary"></div>
      </div>

      <div class="overview-block">
        <h2>Friendly Summary</h2>
        <div class="summary" id="friendlySummary"></div>
      </div>

      <div class="overview-block">
        <h2>Training Summary</h2>
        <div class="summary" id="trainingSummary"></div>
      </div>

      <div class="card executive">
        <h2>Executive Summary</h2>
        <p id="executiveSummary">Loading summary...</p>
      </div>
    </section>

    <section id="goals" class="page">
      <div class="card filters">
        <h3>Competition</h3>
        <label><input type="radio" name="goalComp" value="All" checked> All</label>
        <label><input type="radio" name="goalComp" value="League"> League</label>
        <label><input type="radio" name="goalComp" value="Cup"> Cup</label>
        <label><input type="radio" name="goalComp" value="Shield"> Shield</label>
        <label><input type="radio" name="goalComp" value="Friendly"> Friendly</label>

        <h3>Home / Away</h3>
        <label><input type="radio" name="goalHA" value="Both" checked> Both</label>
        <label><input type="radio" name="goalHA" value="Home"> Home</label>
        <label><input type="radio" name="goalHA" value="Away"> Away</label>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">Goals by Player</h2>
        <div class="chart-box">
          <canvas id="goalsByPlayerChart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">Goals Timeline</h2>
        <div class="chart-box">
          <canvas id="goalsTimelineChart"></canvas>
        </div>
      </div>
    </section>

    <section id="attendance" class="page">
      <div class="chart-container">
        <h2 class="chart-title">Match Attendance</h2>
        <div class="chart-box">
          <canvas id="matchAttendanceChart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">Training Attendance</h2>
        <div class="chart-box">
          <canvas id="trainingAttendanceChart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script>
    const DATA = "data/";
    let store = {};
    let charts = {};

    function safeNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function selected(name) {
      return document.querySelector(`input[name="${name}"]:checked`).value;
    }

    async function getJson(file) {
      const response = await fetch(`${DATA}${file}.json`);
      if (!response.ok) throw new Error(`${file}.json not found`);
      return response.json();
    }

    async function loadData() {
      store.matches = await getJson("matches");
      store.goals = await getJson("goals");
      store.matchAttendance = await getJson("match-attendance");
      store.trainingAttendance = await getJson("training-attendance");
      store.players = await getJson("players");
    }

    function isCompetitive(match) {
      return ["League", "Cup", "Shield"].includes(match.competition);
    }

    function destroyChart(name) {
      if (charts[name]) charts[name].destroy();
    }

    function chartTextColour() {
      return document.body.classList.contains("dark") ? "#e5e7eb" : "#0f172a";
    }

    function drawBar(name, canvasId, labels, data, colour) {
      destroyChart(name);

      charts[name] = new Chart(document.getElementById(canvasId), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colour,
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 900,
            easing: "easeOutQuart"
          },
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: {
              ticks: {
                color: chartTextColour(),
                autoSkip: false,
                maxRotation: 65,
                minRotation: 35
              },
              grid: { display: false }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: chartTextColour(),
                precision: 0
              },
              grid: {
                color: document.body.classList.contains("dark")
                  ? "rgba(255,255,255,0.08)"
                  : "rgba(15,23,42,0.08)"
              }
            }
          }
        }
      });
    }

    function drawLine(name, canvasId, labels, data) {
      destroyChart(name);

      charts[name] = new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Goals",
            data,
            borderColor: "#38bdf8",
            backgroundColor: "rgba(56, 189, 248, 0.16)",
            fill: true,
            tension: 0.35,
            pointRadius: 4,
            pointHoverRadius: 7
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 900,
            easing: "easeOutQuart"
          },
          scales: {
            x: {
              ticks: {
                color: chartTextColour(),
                maxRotation: 65,
                minRotation: 35
              },
              grid: { display: false }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: chartTextColour(),
                precision: 0
              },
              grid: {
                color: document.body.classList.contains("dark")
                  ? "rgba(255,255,255,0.08)"
                  : "rgba(15,23,42,0.08)"
              }
            }
          }
        }
      });
    }

    function goalTotals(rows) {
      return store.players.map(player =>
        rows.reduce((sum, row) => sum + safeNumber(row.goals?.[player]), 0)
      );
    }

    function attendanceTotals(rows) {
      return store.players.map(player =>
        rows.reduce((sum, row) => {
          const value = String(row.attendance?.[player] || "").toUpperCase();
          return sum + (value === "Y" ? 1 : 0);
        }, 0)
      );
    }

    function matchStats(matches) {
      return {
        games: matches.length,
        wins: matches.filter(m => m.result === "Win").length,
        draws: matches.filter(m => m.result === "Draw").length,
        losses: matches.filter(m => m.result === "Loss").length,
        goalsFor: matches.reduce((s, m) => s + safeNumber(m.goalsFor), 0),
        goalsAgainst: matches.reduce((s, m) => s + safeNumber(m.goalsAgainst), 0)
      };
    }

    function renderOverview() {
      const competitiveMatches = store.matches.filter(isCompetitive);
      const friendlyMatches = store.matches.filter(m => m.competition === "Friendly");

      const competitive = matchStats(competitiveMatches);
      const friendly = matchStats(friendlyMatches);

      const trainingSessions = store.trainingAttendance.length;
      const trainingAttendances = store.trainingAttendance.reduce((s, a) => s + safeNumber(a.count), 0);
      const averageTrainingFigure = trainingSessions > 0
        ? trainingAttendances / trainingSessions
        : 0;

      const squadSize = store.players.length;
      const averageTrainingPercentage = trainingSessions > 0 && squadSize > 0
        ? (trainingAttendances / (trainingSessions * squadSize)) * 100
        : 0;

      document.getElementById("competitiveSummary").innerHTML = `
        <div class="stat"><b>${competitive.games}</b><span>Competitive Games</span></div>
        <div class="stat"><b>${competitive.wins}</b><span>Wins</span></div>
        <div class="stat"><b>${competitive.draws}</b><span>Draws</span></div>
        <div class="stat"><b>${competitive.losses}</b><span>Losses</span></div>
        <div class="stat"><b>${competitive.goalsFor}</b><span>Goals For</span></div>
        <div class="stat"><b>${competitive.goalsAgainst}</b><span>Goals Against</span></div>
      `;

      document.getElementById("friendlySummary").innerHTML = `
        <div class="stat friendly"><b>${friendly.games}</b><span>Friendly Games</span></div>
        <div class="stat friendly"><b>${friendly.wins}</b><span>Wins</span></div>
        <div class="stat friendly"><b>${friendly.draws}</b><span>Draws</span></div>
        <div class="stat friendly"><b>${friendly.losses}</b><span>Losses</span></div>
        <div class="stat friendly"><b>${friendly.goalsFor}</b><span>Goals For</span></div>
        <div class="stat friendly"><b>${friendly.goalsAgainst}</b><span>Goals Against</span></div>
      `;

      document.getElementById("trainingSummary").innerHTML = `
        <div class="stat training"><b>${trainingSessions}</b><span>Training Sessions</span></div>
        <div class="stat training"><b>${trainingAttendances}</b><span>Total Attendances</span></div>
        <div class="stat training"><b>${averageTrainingFigure.toFixed(1)}</b><span>Average Attendance</span></div>
        <div class="stat training"><b>${averageTrainingPercentage.toFixed(1)}%</b><span>Average Attendance %</span></div>
      `;

      document.getElementById("executiveSummary").innerText =
        `Danson U21 have recorded ${competitive.games} competitive fixtures, with ${competitive.wins} wins, ${competitive.draws} draws and ${competitive.losses} losses. In competitive games, the team has scored ${competitive.goalsFor} and conceded ${competitive.goalsAgainst}. Friendlies are tracked separately, with ${friendly.games} friendly fixtures, ${friendly.wins} wins, ${friendly.draws} draws and ${friendly.losses} losses. Training is separated from matches, with ${trainingSessions} sessions, ${trainingAttendances} total attendances, an average of ${averageTrainingFigure.toFixed(1)} players per session and an average attendance rate of ${averageTrainingPercentage.toFixed(1)}%.`;
    }

    function goalFilters(row) {
      const comp = selected("goalComp");
      const ha = selected("goalHA");

      return (
        (comp === "All" || row.competition === comp) &&
        (ha === "Both" || row.homeAway === ha)
      );
    }

    function renderGoals() {
      const filteredGoals = store.goals.filter(goalFilters);

      drawBar(
        "goalsByPlayer",
        "goalsByPlayerChart",
        store.players,
        goalTotals(filteredGoals),
        "rgba(37, 99, 235, 0.78)"
      );

      drawLine(
        "goalsTimeline",
        "goalsTimelineChart",
        filteredGoals.map(g => `${g.date} - ${g.opposition}`),
        filteredGoals.map(g => safeNumber(g.total))
      );
    }

    function renderAttendance() {
      drawBar(
        "matchAttendance",
        "matchAttendanceChart",
        store.players,
        attendanceTotals(store.matchAttendance),
        "rgba(37, 99, 235, 0.78)"
      );

      drawBar(
        "trainingAttendance",
        "trainingAttendanceChart",
        store.players,
        attendanceTotals(store.trainingAttendance),
        "rgba(16, 185, 129, 0.82)"
      );
    }

    function renderCurrentPage() {
      const activePage = document.querySelector(".page.active").id;

      if (activePage === "overview") renderOverview();
      if (activePage === "goals") renderGoals();
      if (activePage === "attendance") renderAttendance();
    }

    function setupTabs() {
      document.querySelectorAll(".tab-btn").forEach(button => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

          button.classList.add("active");
          document.getElementById(button.dataset.page).classList.add("active");

          setTimeout(renderCurrentPage, 80);
        });
      });
    }

    function setupDarkMode() {
      const toggle = document.getElementById("themeToggle");
      const savedTheme = localStorage.getItem("theme");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
        toggle.textContent = "Light Mode";
      }

      toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        toggle.textContent = isDark ? "Light Mode" : "Dark Mode";

        setTimeout(renderCurrentPage, 80);
      });
    }

    loadData()
      .then(() => {
        setupTabs();
        setupDarkMode();

        document.querySelectorAll("input[type='radio']").forEach(input => {
          input.addEventListener("change", () => {
            setTimeout(renderCurrentPage, 80);
          });
        });

        renderOverview();
      })
      .catch(error => {
        document.querySelector("main").innerHTML = `
          <div class="card" style="border-left:6px solid red;">
            <h2>Stats failed to load</h2>
            <p><code>${error.message}</code></p>
          </div>
        `;
      });
  </script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danson U21 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --navy: #071d3a;
      --blue: #0b5ed7;
      --gold: #f4c542;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --line: #e5e7eb;
      --shadow: 0 8px 24px rgba(7, 29, 58, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 18px;
      background: linear-gradient(135deg, var(--navy), #123f78);
      color: white;
      padding: 26px 22px;
      border-bottom: 5px solid var(--gold);
    }

    .hero img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      background: white;
      border-radius: 50%;
      padding: 6px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
    }

    .hero p {
      margin: 6px 0 0;
      color: #dbeafe;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: none;
      background: white;
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: var(--shadow);
    }

    .tab-btn.active {
      background: var(--navy);
      color: white;
      border-bottom: 4px solid var(--gold);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .card,
    .chart-container {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      border: 1px solid var(--line);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat {
      background: linear-gradient(135deg, var(--navy), var(--blue));
      color: white;
      padding: 18px;
      border-radius: 16px;
      border-bottom: 4px solid var(--gold);
    }

    .stat b {
      display: block;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .filters h3 {
      margin: 16px 0 10px;
      color: var(--navy);
    }

    .filters label {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef2f7;
      margin: 5px 6px 5px 0;
      cursor: pointer;
    }

    .filters input {
      margin-right: 6px;
      accent-color: var(--blue);
    }

    .chart-title {
      margin-top: 0;
      color: var(--navy);
    }

    .chart-box {
      height: 430px;
      position: relative;
    }

    .executive {
      font-size: 17px;
      line-height: 1.6;
    }

    @media (max-width: 650px) {
      main { padding: 14px; }
      .hero img { width: 64px; height: 64px; }
      .chart-box { height: 360px; }
    }
  </style>
</head>

<body>
  <header class="hero">
    <img src="Danson-Logo.png" alt="Danson logo">
    <div>
      <h1>Danson U21 Dashboard</h1>
      <p>2025/26 Season Statistics</p>
    </div>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab-btn active" data-page="overview">Overview</button>
      <button class="tab-btn" data-page="goals">Goals</button>
      <button class="tab-btn" data-page="attendance">Attendance</button>
    </nav>

    <section id="overview" class="page active">
      <div class="summary" id="overviewSummary"></div>

      <div class="card executive">
        <h2>Executive Summary</h2>
        <p id="executiveSummary">Loading summary...</p>
      </div>
    </section>

    <section id="goals" class="page">
      <div class="card filters">
        <h3>Competition</h3>
        <label><input type="radio" name="goalComp" value="All" checked> All</label>
        <label><input type="radio" name="goalComp" value="League"> League</label>
        <label><input type="radio" name="goalComp" value="Cup"> Cup</label>
        <label><input type="radio" name="goalComp" value="Shield"> Shield</label>
        <label><input type="radio" name="goalComp" value="Friendly"> Friendly</label>

        <h3>Home / Away</h3>
        <label><input type="radio" name="goalHA" value="Both" checked> Both</label>
        <label><input type="radio" name="goalHA" value="Home"> Home</label>
        <label><input type="radio" name="goalHA" value="Away"> Away</label>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">Goals by Player</h2>
        <div class="chart-box">
          <canvas id="goalsByPlayerChart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">Goals Timeline</h2>
        <div class="chart-box">
          <canvas id="goalsTimelineChart"></canvas>
        </div>
      </div>
    </section>

    <section id="attendance" class="page">
      <div class="chart-container">
        <h2 class="chart-title">Match Attendance</h2>
        <div class="chart-box">
          <canvas id="matchAttendanceChart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">Training Attendance</h2>
        <div class="chart-box">
          <canvas id="trainingAttendanceChart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script>
    const DATA = "data/";

    let store = {};
    let charts = {};

    function selected(name) {
      return document.querySelector(`input[name="${name}"]:checked`).value;
    }

    async function getJson(file) {
      const response = await fetch(`${DATA}${file}.json`);
      if (!response.ok) throw new Error(`${file}.json not found`);
      return response.json();
    }

    async function loadData() {
      store.matches = await getJson("matches");
      store.goals = await getJson("goals");
      store.matchAttendance = await getJson("match-attendance");
      store.trainingAttendance = await getJson("training-attendance");
      store.players = await getJson("players");
    }

    function destroyChart(name) {
      if (charts[name]) charts[name].destroy();
    }

    function drawBar(name, canvasId, labels, data, colour) {
      destroyChart(name);
      charts[name] = new Chart(document.getElementById(canvasId), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colour,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { autoSkip: false, maxRotation: 65, minRotation: 35 } },
            y: { beginAtZero: true, ticks: { precision: 0 } }
          }
        }
      });
    }

    function drawLine(name, canvasId, labels, data) {
      destroyChart(name);
      charts[name] = new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Goals",
            data,
            borderColor: "#0b5ed7",
            backgroundColor: "rgba(11, 94, 215, 0.15)",
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0 } }
          }
        }
      });
    }

    function playerTotals(rows, field) {
      return store.players.map(player =>
        rows.reduce((sum, row) => sum + Number(row[field]?.[player] || 0), 0)
      );
    }

    function renderOverview() {
      const games = store.matches.length;
      const wins = store.matches.filter(m => m.result === "Win").length;
      const draws = store.matches.filter(m => m.result === "Draw").length;
      const losses = store.matches.filter(m => m.result === "Loss").length;
      const goalsFor = store.matches.reduce((s, m) => s + Number(m.goalsFor || 0), 0);
      const goalsAgainst = store.matches.reduce((s, m) => s + Number(m.goalsAgainst || 0), 0);

      const matchAttendances = store.matchAttendance.reduce((s, a) => s + Number(a.count || 0), 0);
      const trainingAttendances = store.trainingAttendance.reduce((s, a) => s + Number(a.count || 0), 0);

      document.getElementById("overviewSummary").innerHTML = `
        <div class="stat"><b>${games}</b><span>Games</span></div>
        <div class="stat"><b>${wins}</b><span>Wins</span></div>
        <div class="stat"><b>${draws}</b><span>Draws</span></div>
        <div class="stat"><b>${losses}</b><span>Losses</span></div>
        <div class="stat"><b>${goalsFor}</b><span>Goals For</span></div>
        <div class="stat"><b>${goalsAgainst}</b><span>Goals Against</span></div>
        <div class="stat"><b>${matchAttendances}</b><span>Match Attendances</span></div>
        <div class="stat"><b>${trainingAttendances}</b><span>Training Attendances</span></div>
      `;

      document.getElementById("executiveSummary").innerText =
        `Danson U21 have played ${games} recorded fixtures, with ${wins} wins, ${draws} draws and ${losses} losses. The team has scored ${goalsFor} goals and conceded ${goalsAgainst}. Attendance tracking is split between match days and training, giving a clearer view of player availability and commitment across the season.`;
    }

    function goalFilters(row) {
      const comp = selected("goalComp");
      const ha = selected("goalHA");

      return (
        (comp === "All" || row.competition === comp) &&
        (ha === "Both" || row.homeAway === ha)
      );
    }

    function renderGoals() {
      const filteredGoals = store.goals.filter(goalFilters);

      drawBar(
        "goalsByPlayer",
        "goalsByPlayerChart",
        store.players,
        playerTotals(filteredGoals, "goals"),
        "rgba(11, 94, 215, 0.75)"
      );

      const timelineLabels = filteredGoals.map(g => `${g.date} ${g.opposition}`);
      const timelineData = filteredGoals.map(g => Number(g.total || 0));

      drawLine(
        "goalsTimeline",
        "goalsTimelineChart",
        timelineLabels,
        timelineData
      );
    }

    function renderAttendance() {
      drawBar(
        "matchAttendance",
        "matchAttendanceChart",
        store.players,
        playerTotals(store.matchAttendance, "attendance"),
        "rgba(11, 94, 215, 0.75)"
      );

      drawBar(
        "trainingAttendance",
        "trainingAttendanceChart",
        store.players,
        playerTotals(store.trainingAttendance, "attendance"),
        "rgba(244, 197, 66, 0.85)"
      );
    }

    function setupTabs() {
      document.querySelectorAll(".tab-btn").forEach(button => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

          button.classList.add("active");
          document.getElementById(button.dataset.page).classList.add("active");

          renderAll();
        });
      });
    }

    function renderAll() {
      renderOverview();
      renderGoals();
      renderAttendance();
    }

    loadData()
      .then(() => {
        setupTabs();

        document.querySelectorAll("input[type='radio']").forEach(input => {
          input.addEventListener("change", renderGoals);
        });

        renderAll();
      })
      .catch(error => {
        document.querySelector("main").innerHTML = `
          <div class="card" style="border-left:6px solid red;">
            <h2>Stats failed to load</h2>
            <p><code>${error.message}</code></p>
          </div>
        `;
      });
  </script>
</body>
</html>

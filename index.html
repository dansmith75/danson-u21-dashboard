<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danson U21 Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --navy: #071d3a;
      --blue: #0b5ed7;
      --gold: #f4c542;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 8px 24px rgba(7, 29, 58, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 18px;
      background: linear-gradient(135deg, var(--navy), #123f78);
      color: white;
      padding: 26px 22px;
      border-bottom: 5px solid var(--gold);
    }

    .hero img {
      width: 82px;
      height: 82px;
      max-width: 82px;
      max-height: 82px;
      object-fit: contain;
      background: white;
      border-radius: 50%;
      padding: 6px;
      flex-shrink: 0;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
    }

    .hero p {
      margin: 6px 0 0;
      color: #dbeafe;
      font-size: 16px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px;
    }

    .card,
    .chart-container {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      border: 1px solid var(--line);
    }

    .filters h3 {
      margin: 18px 0 10px;
      color: var(--navy);
    }

    .filters h3:first-child {
      margin-top: 0;
    }

    .filters label {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
